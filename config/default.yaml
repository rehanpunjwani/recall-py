# Default TokenGuard configuration. Override with ~/.config/tokenguard/config.yaml or TOKENGUARD_* env.

ollama:
  base_url: "http://127.0.0.1:11434"
  embed_model: "nomic-embed-text"
  chat_model: "llama3.2"
  timeout_seconds: 120

storage:
  # Resolved relative to cwd if not absolute
  db_path: "~/.local/share/tokenguard/tokenguard.db"

limits:
  max_local_answer_tokens: 512
  max_chunks_for_prompt: 8
  chunk_size_chars: 1200
  chunk_overlap_chars: 150

policy:
  always_escalate_keywords: []
  redact_patterns:
    - '(?i)(api[_-]?key|secret|token|password)\\s*[:=]\\s*[^\\s]+'
  auto_escalate: false
  confidence_threshold: 0.5

proxy:
  enabled: false
  try_local_first: false
  listen_host: "127.0.0.1"
  listen_port: 8765
  upstream_base_url: ""
  upstream_api_key_env: "OPENAI_API_KEY"
  cache_ttl_seconds: 86400
  cache_max_entries: 10000

provider:
  type: "ollama"
  base_url: ""
  embed_model: ""
  chat_model: ""
  api_key_env: "OPENAI_API_KEY"

api:
  listen_host: "127.0.0.1"
  listen_port: 8766
